<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>🦖 恐龍蛋 POS (專業營運版)</title>
<style>
    :root { 
        --theme-yellow: #fde047; --theme-orange: #fed7aa; 
        --dark-text: #422006; --soft-bg: #fffcf0;
        --green: #22c55e; --red: #ef4444; --blue: #2563eb; 
        --slate: #64748b; --pink-disc: #fb7185;
        --line-green: #06c755; --px-blue: #3b82f6; --cash-gold: #fbbf24;
    }
    /* 修復：讓 body 高度 100% 並隱藏滾動條 */
    body { margin: 0; font-family: 'PingFang TC', sans-serif; background: var(--soft-bg); color: var(--dark-text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    /* 修復：主區域填滿剩餘高度 */
    .main-wrapper { display: flex; flex: 1; overflow: hidden; border-bottom: 2px solid #eab308; }
    
    .left-panel { width: 35%; border-right: 3px solid #eab308; display: flex; flex-direction: column; background: #fff; }
    .left-panel header { background: var(--green); color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 22px; }
    #kdsArea { flex: 1; overflow-y: auto; padding: 12px; }
    
    .right-panel { width: 65%; display: flex; flex-direction: column; overflow: hidden; }
    .right-panel header { background: var(--theme-yellow); text-align: center; padding: 10px; font-size: 14px; font-weight: bold; }
    
    .items-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; overflow-y: auto; flex: 1; }
    .item-card { border-radius: 12px; padding: 10px; text-align: center; background: var(--theme-orange); border: 1px solid #fb923c; display: flex; flex-direction: column; justify-content: center; }
    .item-name { font-size: 24px; font-weight: 900; }
    
    /* 控制區高度固定，確保不會被擠壓 */
    .control-panel { background: var(--soft-bg); padding-bottom: 10px; }
    
    .btn-qty { width: 40px; height: 40px; font-size: 24px; border-radius: 8px; border: none; background: #fff; color: #ea580c; font-weight: bold; }
    .cart-box { background: #fff; margin: 0 10px; padding: 10px; border-radius: 15px; border: 3px solid var(--theme-yellow); height: 100px; overflow-y: auto; }
    #cartList { font-size: 18px; font-weight: bold; }
    .total-text { font-size: 36px; font-weight: bold; text-align: right; color: #854d0e; padding: 5px 15px; }
    
    .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 10px; }
    .pay-grid button { padding: 18px 2px; border: none; border-radius: 12px; font-weight: bold; color: #fff; font-size: 16px; cursor: pointer; touch-action: manipulation; }
    
    /* 彈窗優化 */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; align-items: center; justify-content: center; }
    .overlay.active { display: flex; }
    .modal { background: #fff; width: 95%; max-width: 500px; padding: 25px; border-radius: 25px; box-sizing: border-box; }
    
    /* 修復：九宮格按鈕點擊感 */
    .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .num-grid button { padding: 25px 5px; font-size: 32px; font-weight: bold; border-radius: 15px; border: 1px solid #ddd; background: #fff; touch-action: manipulation; }
    .num-grid button:active { background: #f1f5f9; }

    .kds-card { background: #fefce8; padding: 12px; border-radius: 15px; margin-bottom: 12px; border: 2px solid #fde047; box-shadow: 0 4px 0 #fde047; position: relative; }
    .kds-amount { position: absolute; right: 12px; top: 12px; font-size: 18px; color: var(--blue); font-weight: 900; }
    .phone-tag { font-size: 28px; color: var(--red); font-weight: 900; cursor: pointer; }
    .btn-done { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: 12px; margin-top: 10px; font-weight: bold; font-size: 22px; cursor: pointer; }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-panel">
        <header>待出餐明細</header>
        <div id="kdsArea"></div>
    </div>
    <div class="right-panel">
        <header>🦖 恐龍蛋 POS 系統</header>
        <div id="menuArea" class="items-container"></div>
        
        <div class="control-panel">
            <div class="cart-box"><div id="cartList">🛒 點餐內容...</div></div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="voidLastOrder()" style="margin-left:15px; background:var(--red); color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:bold;">🚨 作廢上一筆</button>
                <div class="total-text">總計 $<span id="finalTotal">0</span></div>
            </div>
            <div class="pay-grid">
                <button style="background:var(--cash-gold); color:var(--dark-text);" onclick="openPhoneInput('現金')">💰 現金結帳</button>
                <button style="background:var(--line-green);" onclick="openPhoneInput('LINE Pay')">LINE Pay</button>
                <button style="background:var(--px-blue);" onclick="openPhoneInput('全支付')">全支付</button>
                <button style="background:var(--pink-disc);" onclick="openDiscountModal()">✂️ 折扣</button>
                <button style="background:var(--slate); grid-column: span 2;" onclick="verifyAdmin()">📊 報表/同步雲端</button>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="phoneModal"><div class="modal"><h3>📱 手機末三碼</h3><div id="phoneDisplay" style="font-size:60px; text-align:center; padding:15px; background:#f1f5f9; border-radius:15px; margin-bottom:15px; font-weight:bold; color:var(--blue);">---</div><div class="num-grid"><button onclick="pressPhone('1')">1</button><button onclick="pressPhone('2')">2</button><button onclick="pressPhone('3')">3</button><button onclick="pressPhone('4')">4</button><button onclick="pressPhone('5')">5</button><button onclick="pressPhone('6')">6</button><button onclick="pressPhone('7')">7</button><button onclick="pressPhone('8')">8</button><button onclick="pressPhone('9')">9</button><button onclick="clearPhone()" style="font-size:24px;">清空</button><button onclick="pressPhone('0')">0</button><button onclick="confirmPhone()" style="background:var(--green); color:white; font-size:24px;">確認</button></div></div></div>
<div class="overlay" id="cashModal"><div class="modal"><h3>💰 現金實收</h3><div id="cashDisplay" style="font-size:60px; text-align:center; padding:15px; background:#f1f5f9; border-radius:15px; margin-bottom:15px; font-weight:bold; color:var(--green);">0</div><div class="num-grid"><button onclick="quickCash(100)" style="background:var(--blue); color:white; font-size:18px;">+100</button><button onclick="quickCash(500)" style="background:var(--blue); color:white; font-size:18px;">+500</button><button onclick="quickCash(1000)" style="background:var(--blue); color:white; font-size:18px;">+1000</button><button onclick="pressCash('1')">1</button><button onclick="pressCash('2')">2</button><button onclick="pressCash('3')">3</button><button onclick="pressCash('4')">4</button><button onclick="pressCash('5')">5</button><button onclick="pressCash('6')">6</button><button onclick="pressCash('7')">7</button><button onclick="pressCash('8')">8</button><button onclick="pressCash('9')">9</button><button onclick="clearCash()" style="font-size:24px;">清除</button><button onclick="pressCash('0')">0</button><button onclick="submitCash()" style="background:var(--green); color:white; font-size:24px;">結帳</button></div></div></div>
<div class="overlay" id="changeModal"><div class="modal" style="text-align:center;"><h2>應找零</h2><div id="changeVal" style="font-size:80px; color:var(--red); font-weight:bold;">$0</div><button onclick="closeChangeModal()" style="width:100%; padding:20px; background:var(--green); color:#fff; border:none; border-radius:15px; font-size:32px;">完成收錢！</button></div></div>
<div class="overlay" id="flavorModal">...</div>
<div class="overlay" id="adminModal">...</div>
<div class="overlay" id="discountModal">...</div>

<script>
const ADMIN_PIN = "771130";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyxxX5Ej3vF1716rKku8TYnk2he0ywGaPT6_vX0WjPyENcplnZqm0ilu7L-DONRU_aJXw/exec";

// --- 以下邏輯均已針對卡頓優化 ---
const products = [
    { name: "原味", price: 55 }, { name: "Oreo", price: 65 },
    { name: "卡士達", price: 65 }, { name: "起司", price: 70 },
    { name: "芋泥", price: 70 }, { name: "巧克力卡士達", price: 70 },
    { name: "黑糖麻糬", price: 70 },
    { name: "桂冠湯圓", price: 85, hasFlavor: true },
    { name: "限定口味60", price: 60 }, { name: "限定口味65", price: 65 },
    { name: "限定口味70", price: 70 }, { name: "限定口味80", price: 80 },
];

let cart = [], salesData = JSON.parse(localStorage.getItem('stall_sales')) || [];
let kdsOrders = JSON.parse(localStorage.getItem('stall_kds')) || [];
let orderCounter = parseInt(localStorage.getItem('order_counter')) || 1;
let currentType = "", phoneTyped = "", cashTyped = "", discountAmount = 0;

function renderMenu() {
    let h = "";
    products.forEach(p => {
        let count = cart.filter(x => x.name === p.name).length;
        h += `<div class="item-card"><span class="item-name">${p.name}</span><span style="font-size:14px; color:#ea580c; font-weight:bold;">$${p.price}</span><div style="margin-top:10px; display:flex; justify-content:center; align-items:center; gap:12px;"><button class="btn-qty" onclick="removeFromCart('${p.name}')">-</button><b style="font-size:22px;">${count}</b><button class="btn-qty" onclick="addToCart('${p.name}')">+</button></div></div>`;
    });
    document.getElementById('menuArea').innerHTML = h;
}

function openPhoneInput(type) { if(cart.length === 0) return; currentType = type; phoneTyped = ""; document.getElementById('phoneDisplay').innerText = "---"; openOverlay('phoneModal'); }
function pressPhone(n) { if(phoneTyped.length < 3) phoneTyped += n; document.getElementById('phoneDisplay').innerText = phoneTyped; }
function confirmPhone() { 
    closeOverlay('phoneModal');
    if(currentType === '現金') { cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; openOverlay('cashModal'); }
    else { finishOrder(currentType, phoneTyped); }
}

function pressCash(n) { cashTyped += n; document.getElementById('cashDisplay').innerText = parseInt(cashTyped) || 0; }
function quickCash(v) { let cur = parseInt(document.getElementById('cashDisplay').innerText) || 0; cashTyped = (cur + v).toString(); document.getElementById('cashDisplay').innerText = cashTyped; }
function submitCash() {
    const target = parseInt(document.getElementById('finalTotal').innerText);
    const typed = parseInt(cashTyped) || 0;
    if (typed < target) return alert("實收金額不足");
    document.getElementById('changeVal').innerText = "$" + (typed - target);
    closeOverlay('cashModal'); 
    openOverlay('changeModal'); 
    finishOrder("現金", phoneTyped);
}

function closeChangeModal() {
    closeOverlay('changeModal');
    // 強制重設所有狀態
    cashTyped = "";
    phoneTyped = "";
}

// 其餘功能 (addToCart, updateCartUI, finishOrder, syncToCloud...) 維持不變
// ... (請補上之前代碼中的其餘函式) ...

function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
function persist() { localStorage.setItem('stall_sales', JSON.stringify(salesData)); localStorage.setItem('stall_kds', JSON.stringify(kdsOrders)); localStorage.setItem('order_counter', orderCounter); }
function renderKDS() { /* 保持之前 KDS 渲染邏輯 */ }
function updateCartUI() { /* 保持之前購物車邏輯 */ }

renderMenu();
</script>
</body>
</html>
