<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>🦖 恐龍蛋 POS (iPad 精簡專業版)</title>
<style>
    :root { 
        --theme-yellow: #fde047; --theme-orange: #fed7aa; 
        --dark-text: #422006; --soft-bg: #fffcf0;
        --green: #22c55e; --red: #ef4444; --blue: #2563eb; 
        --slate: #64748b; --pink-disc: #fb7185;
        --line-green: #06c755; --px-blue: #3b82f6; --cash-gold: #fbbf24;
    }
    body { margin: 0; font-family: 'PingFang TC', sans-serif; background: var(--soft-bg); color: var(--dark-text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .main-wrapper { display: flex; flex: 1; overflow: hidden; height: 100vh; }
    
    /* 左側待出餐區 - 調窄並縮緊間距 */
    .left-panel { width: 28%; border-right: 3px solid #eab308; display: flex; flex-direction: column; background: #fff; }
    .left-panel header { background: var(--green); color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 20px; }
    #kdsArea { flex: 1; overflow-y: auto; padding: 8px; background: #f1f5f9; }
    
    /* 右側菜單區 - 寬度增加 */
    .right-panel { width: 72%; display: flex; flex-direction: column; }
    .right-panel header { background: var(--theme-yellow); text-align: center; padding: 6px; font-size: 14px; font-weight: bold; }
    .items-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px; overflow-y: auto; flex: 1; }
    .item-card { border-radius: 12px; padding: 8px; text-align: center; background: var(--theme-orange); border: 1px solid #fb923c; min-height: 90px; display: flex; flex-direction: column; justify-content: center; }
    .item-name { font-size: 22px; font-weight: 900; }
    
    /* 控制台 */
    .control-area { background: #fff; border-top: 3px solid var(--theme-yellow); padding-bottom: env(safe-area-inset-bottom); }
    .cart-box { background: #fefce8; margin: 8px; padding: 10px; border-radius: 12px; border: 2px solid var(--theme-yellow); min-height: 50px; max-height: 80px; overflow-y: auto; font-size: 16px; font-weight: bold; }
    .total-text { font-size: 36px; font-weight: bold; text-align: right; color: #854d0e; padding-right: 15px; }
    .pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 8px 10px 8px; }
    .pay-grid button { padding: 18px 2px; border: none; border-radius: 12px; font-weight: bold; color: #fff; font-size: 18px; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }

    /* KDS 卡片精簡化 */
    .kds-card { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 2px solid #eab308; position: relative; }
    .kds-amount { position: absolute; right: 10px; top: 10px; font-size: 18px; color: var(--blue); font-weight: 900; }
    .phone-tag { font-size: 28px; color: var(--red); font-weight: 900; text-decoration: underline dotted; }
    .kds-items { font-size: 22px; font-weight: 900; color: #000; border-top: 1px dashed #ccc; margin-top: 6px; padding-top: 6px; line-height: 1.2; }

    /* 彈窗與報表 */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; align-items: center; justify-content: center; }
    .overlay.active { display: flex; }
    .modal { background: #fff; width: 95%; max-width: 600px; padding: 20px; border-radius: 25px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; text-align: center; }
    .report-stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    .report-card { padding: 12px; border-radius: 12px; color: #fff; text-align: center; font-size: 14px; }
    .num-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .num-grid button { padding: 22px 5px; font-size: 28px; font-weight: bold; border-radius: 15px; border: 1px solid #ddd; background: #fff; }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-panel"><header>待出餐</header><div id="kdsArea"></div></div>
    <div class="right-panel">
        <header>🦖 恐龍蛋 POS 專業版</header>
        <div id="menuArea" class="items-container"></div>
        <div class="control-area">
            <div class="cart-box" id="cartList">🛒 點餐內容...</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="voidLastOrder()" style="margin-left:15px; background:var(--red); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:bold; font-size:14px;">🚨 作廢上一筆</button>
                <div class="total-text">總計 $<span id="finalTotal">0</span></div>
            </div>
            <div class="pay-grid">
                <button style="background:var(--cash-gold); color:var(--dark-text);" onclick="openPhoneInput('現金')">💰 現金</button>
                <button style="background:var(--line-green);" onclick="openPhoneInput('LINE Pay')">LINE Pay</button>
                <button style="background:var(--px-blue);" onclick="openPhoneInput('全支付')">全支付</button>
                <button style="background:var(--pink-disc);" onclick="openDiscountModal()">✂️ 折扣</button>
                <button style="background:var(--slate); grid-column: span 2;" onclick="verifyAdmin()">📊 報表/同步雲端</button>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="phoneModal"><div class="modal"><h3>📱 手機末三碼</h3><div id="phoneDisplay" style="font-size:55px; text-align:center; padding:15px; background:#f1f5f9; border-radius:15px; margin-bottom:15px; font-weight:bold; color:var(--blue);">---</div><div class="num-grid"><button onclick="pressPhone('1')">1</button><button onclick="pressPhone('2')">2</button><button onclick="pressPhone('3')">3</button><button onclick="pressPhone('4')">4</button><button onclick="pressPhone('5')">5</button><button onclick="pressPhone('6')">6</button><button onclick="pressPhone('7')">7</button><button onclick="pressPhone('8')">8</button><button onclick="pressPhone('9')">9</button><button onclick="clearPhone()">清空</button><button onclick="pressPhone('0')">0</button><button onclick="confirmPhone()" style="background:var(--green); color:white;">確認</button></div></div></div>
<div class="overlay" id="cashModal"><div class="modal"><h3>💰 現金實收</h3><div id="cashDisplay" style="font-size:55px; text-align:center; padding:15px; background:#f1f5f9; border-radius:15px; margin-bottom:15px; font-weight:bold; color:var(--green);">0</div><div class="num-grid"><button onclick="quickCash(100)" style="background:var(--blue); color:white;">+100</button><button onclick="quickCash(500)" style="background:var(--blue); color:white;">+500</button><button onclick="quickCash(1000)" style="background:var(--blue); color:white;">+1000</button><button onclick="pressCash('1')">1</button><button onclick="pressCash('2')">2</button><button onclick="pressCash('3')">3</button><button onclick="pressCash('4')">4</button><button onclick="pressCash('5')">5</button><button onclick="pressCash('6')">6</button><button onclick="pressCash('7')">7</button><button onclick="pressCash('8')">8</button><button onclick="pressCash('9')">9</button><button onclick="clearCash()">清除</button><button onclick="pressCash('0')">0</button><button onclick="submitCash()" style="background:var(--green); color:white;">結帳</button></div></div></div>
<div class="overlay" id="changeModal"><div class="modal"><h2>應找零</h2><div id="changeVal" style="font-size:80px; color:var(--red); font-weight:bold;">$0</div><button onclick="closeOverlay('changeModal')" style="width:100%; padding:20px; background:var(--green); color:#fff; border:none; border-radius:15px; font-size:26px;">完成</button></div></div>
<div class="overlay" id="adminModal"><div class="modal"><div id="reportContent"></div><button onclick="closeOverlay('adminModal')" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:12px; margin-top:15px;">關閉報表</button></div></div>
<div class="overlay" id="discountModal"><div class="modal"><h3>✂️ 折扣</h3><div id="discDisplay" style="font-size:55px; text-align:center; padding:15px; background:#f1f5f9; border-radius:15px; margin-bottom:15px; font-weight:bold; color:var(--red);">0</div><div class="num-grid"><button onclick="pressDisc('1')">1</button><button onclick="pressDisc('2')">2</button><button onclick="pressDisc('3')">3</button><button onclick="pressDisc('4')">4</button><button onclick="pressDisc('5')">5</button><button onclick="pressDisc('6')">6</button><button onclick="pressDisc('7')">7</button><button onclick="pressDisc('8')">8</button><button onclick="pressDisc('9')">9</button><button onclick="clearDisc()">清空</button><button onclick="pressDisc('0')">0</button><button onclick="submitDisc()" style="background:var(--green); color:white;">確認</button></div></div></div>
<div class="overlay" id="flavorModal"><div class="modal"><h3>🍡 湯圓口味</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"><button onclick="selectFlavor('花生')" style="padding:22px; font-size:20px; font-weight:bold; border-radius:15px; border:2px solid orange;">🥜 花生</button><button onclick="selectFlavor('芝麻')" style="padding:22px; font-size:20px; font-weight:bold; border-radius:15px; border:2px solid orange;">⚫ 芝麻</button><button onclick="selectFlavor('3花2芝')" style="padding:22px; font-size:20px; font-weight:bold; border-radius:15px; border:2px solid orange;">🌗 3花2芝</button><button onclick="selectFlavor('3芝2花')" style="padding:22px; font-size:20px; font-weight:bold; border-radius:15px; border:2px solid orange;">🌓 3芝2花</button></div></div></div>

<script>
const ADMIN_PIN = "771130";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyxxX5Ej3vF1716rKku8TYnk2he0ywGaPT6_vX0WjPyENcplnZqm0ilu7L-DONRU_aJXw/exec";

const products = [
    { name: "原味", price: 55 }, { name: "Oreo", price: 65 },
    { name: "卡士達", price: 65 }, { name: "起司", price: 70 },
    { name: "芋泥", price: 70 }, { name: "巧克力卡士達", price: 70 },
    { name: "黑糖麻糬", price: 70 },
    { name: "桂冠湯圓", price: 85, hasFlavor: true },
    { name: "限定口味60", price: 60 }, { name: "限定口味65", price: 65 },
    { name: "限定口味70", price: 70 }, { name: "限定口味80", price: 80 },
];

let cart = [], salesData = JSON.parse(localStorage.getItem('stall_sales')) || [];
let kdsOrders = JSON.parse(localStorage.getItem('stall_kds')) || [];
let orderCounter = parseInt(localStorage.getItem('order_counter')) || 1;
let currentType = "", phoneTyped = "", cashTyped = "", discTyped = "", discountAmount = 0, editingKdsId = null;

function renderMenu() {
    let h = "";
    products.forEach(p => {
        let count = cart.filter(x => x.name === p.name).length;
        h += `<div class="item-card"><span class="item-name">${p.name}</span><span style="font-size:13px; color:#ea580c; font-weight:bold;">$${p.price}</span><div style="margin-top:8px; display:flex; justify-content:center; align-items:center; gap:10px;"><button style="width:36px;height:36px;font-size:20px;border-radius:8px;border:none;background:#eee;" onclick="removeFromCart('${p.name}')">-</button><b style="font-size:22px; width:30px; text-align:center;">${count}</b><button style="width:36px;height:36px;font-size:20px;border-radius:8px;border:none;background:#eee;" onclick="addToCart('${p.name}')">+</button></div></div>`;
    });
    document.getElementById('menuArea').innerHTML = h;
}

function addToCart(name) {
    const p = products.find(x => x.name === name);
    if (p.hasFlavor) openOverlay('flavorModal');
    else { cart.push({ ...p, id: Date.now() }); updateCartUI(); }
}
function selectFlavor(f) { cart.push({ name: "桂冠湯圓", price: 85, note: f, id: Date.now() }); updateCartUI(); closeOverlay('flavorModal'); }
function removeFromCart(name) { const idx = cart.map(x => x.name).lastIndexOf(name); if (idx > -1) cart.splice(idx, 1); updateCartUI(); }
function updateCartUI() {
    let s = cart.reduce((acc, curr) => acc + curr.price, 0);
    document.getElementById('finalTotal').innerText = Math.max(0, s - discountAmount);
    document.getElementById('cartList').innerHTML = cart.map(x => `✅${x.name}${x.note?'('+x.note+')':''} `).join("") || "🛒 點餐內容...";
    renderMenu();
}

function finishOrder(type, phone) {
    const now = new Date();
    const orderItems = {};
    cart.forEach(c => { let key = c.name + (c.note ? `(${c.note})` : ""); orderItems[key] = (orderItems[key] || 0) + 1; });
    const o = { id: Date.now(), orderNo: orderCounter++, date: now.toLocaleDateString(), hour: now.getHours(), time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false}), type: type, amount: parseInt(document.getElementById('finalTotal').innerText), items: orderItems, rawItems: [...cart], phone: phone || "---" };
    salesData.push(o); kdsOrders.push(o); persist(); cart = []; discountAmount = 0; updateCartUI(); renderKDS();
}

function renderKDS() {
    let h = "";
    kdsOrders.forEach(o => {
        let pColor = o.type === '現金' ? 'var(--cash-gold)' : (o.type === 'LINE Pay' ? 'var(--line-green)' : 'var(--px-blue)');
        h += `<div class="kds-card">
            <div class="kds-amount">$${o.amount}</div>
            <div style="font-size:14px; font-weight:bold;">#${o.orderNo} <span style="background:${pColor}; padding:1px 6px; border-radius:6px; color:${o.type==='現金'?'black':'white'}">${o.type}</span></div>
            <div style="margin:2px 0;"><span class="phone-tag" onclick="startEditPhone(${o.id})">📞 ${o.phone}</span></div>
            <div class="kds-items">${Object.entries(o.items).map(([n,q])=>`• ${n} x${q}`).join("<br>")}</div>
            <button onclick="doneKDS(${o.id})" style="width:100%; padding:12px; background:var(--green); color:white; border:none; border-radius:10px; margin-top:8px; font-weight:bold; font-size:20px;">出餐</button>
        </div>`;
    });
    document.getElementById('kdsArea').innerHTML = h || "<p style='text-align:center; color:#999; font-size:14px;'>無待餐</p>";
}

function generateReport() {
    const today = new Date().toLocaleDateString();
    const todayData = salesData.filter(s => s.date === today);
    let total = 0, totalQty = 0, payStats = { "現金":0, "LINE Pay":0, "全支付":0 }, prodStats = {}, hourStats = {};
    todayData.forEach(s => {
        total += s.amount; payStats[s.type] += s.amount;
        hourStats[s.hour] = (hourStats[s.hour] || 0) + s.amount;
        for(let k in s.items) { prodStats[k] = (prodStats[k]||0) + s.items[k]; totalQty += s.items[k]; }
    });

    let h = `<h2 style="margin-bottom:10px;">📊 今日營運數據</h2>`;
    h += `<div class="report-stat-grid">
            <div class="report-card" style="background:var(--slate); grid-column: span 2;">今日總收：<b>$${total}</b> / ${totalQty}份</div>
            <div class="report-card" style="background:var(--cash-gold); color:black;">現金:<b>$${payStats["現金"]}</b></div>
            <div class="report-card" style="background:var(--line-green);">LINE:<b>$${payStats["LINE Pay"]}</b></div>
            <div class="report-card" style="background:var(--px-blue);">全付:<b>$${payStats["全支付"]}</b></div>
          </div>`;

    h += `<div style="text-align:left; background:#f0f9ff; padding:10px; border-radius:10px; margin-bottom:10px; font-size:14px;">
            <h4 style="margin:0 0 5px 0;">🕒 時段營收</h4>`;
    Object.keys(hourStats).sort((a,b)=>a-b).forEach(hr => h += `${hr}點:<b>$${hourStats[hr]}</b> | `);
    h += `</div>`;

    h += `<h3 style="text-align:left; margin:10px 0 5px 0;">📜 流水帳 (點擊退單並重載品項)</h3>
          <div style="max-height:250px; overflow-y:auto; border:1px solid #ddd; border-radius:10px;">`;
    todayData.slice().reverse().forEach(s => {
        let itemsDesc = Object.entries(s.items).map(([n,q])=>`${n}x${q}`).join(", ");
        h += `<div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:left; font-size:14px;">
                    <b style="color:var(--blue); font-size:18px;">#${s.orderNo}</b> <b style="color:var(--red);">[📞${s.phone}]</b> - $${s.amount}<br>
                    <span style="color:#666;">${itemsDesc}</span><br><small>${s.time}</small>
                </div>
                <button onclick="voidSpecificOrder(${s.id})" style="background:var(--red); color:white; border:none; border-radius:8px; padding:10px 15px; font-weight:bold;">退單</button>
              </div>`;
    });
    h += `</div><button onclick="syncToCloud()" id="btnSync" style="width:100%; padding:20px; background:var(--green); color:white; border:none; border-radius:15px; margin-top:15px; font-weight:bold; font-size:22px;">☁️ 結束營業同步雲端</button>`;
    document.getElementById('reportContent').innerHTML = h;
}

// 核心退單邏輯：將品項抓回購物車
function voidSpecificOrder(id) {
    const order = salesData.find(x => x.id === id);
    if (!order) return;
    if (!confirm(`確定作廢單號 #${order.orderNo} 嗎？\n作廢後品項將自動帶回點餐區。`)) return;

    // 將該單品項塞回 cart
    cart = [...order.rawItems];
    
    // 從資料中移除
    salesData = salesData.filter(x => x.id !== id);
    kdsOrders = kdsOrders.filter(x => x.id !== id);
    
    persist();
    updateCartUI();
    renderKDS();
    if(document.getElementById('adminModal').classList.contains('active')) generateReport();
    alert(`單號 #${order.orderNo} 已退單，品項已抓回！`);
}

async function syncToCloud() {
    const btn = document.getElementById('btnSync');
    const today = new Date().toLocaleDateString();
    const todayData = salesData.filter(s => s.date === today);
    let total = 0, totalQty = 0, prodStats = {}, payStats = { "現金":0, "LINE Pay":0, "全支付":0 };
    todayData.forEach(s => {
        total += s.amount; payStats[s.type] += s.amount;
        for(let k in s.items) { prodStats[k] = (prodStats[k]||0) + s.items[k]; totalQty += s.items[k]; }
    });
    if(!confirm(`同步 $${total} 元？成功後將重置。`)) return;
    btn.innerText = "⏳ 同步中..."; btn.disabled = true;
    try {
        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ date: today, totalRevenue: total, totalQty: totalQty, payStats: payStats, details: prodStats }) });
        alert("🎉 同步成功！"); localStorage.clear(); location.reload();
    } catch (e) { alert("同步失敗"); btn.innerText = "☁️ 重新同步"; btn.disabled = false; }
}

function startEditPhone(id) { editingKdsId = id; currentType = "EDIT_PHONE"; phoneTyped = ""; document.getElementById('phoneDisplay').innerText = "---"; openOverlay('phoneModal'); }
function voidLastOrder() { if(salesData.length>0) voidSpecificOrder(salesData[salesData.length-1].id); }
function openOverlay(id) { document.getElementById(id).classList.add('active'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }
function persist() { localStorage.setItem('stall_sales', JSON.stringify(salesData)); localStorage.setItem('stall_kds', JSON.stringify(kdsOrders)); localStorage.setItem('order_counter', orderCounter); }
function doneKDS(id) { kdsOrders = kdsOrders.filter(x => x.id !== id); persist(); renderKDS(); }
function verifyAdmin() { if(prompt("管理員密碼")===ADMIN_PIN) { generateReport(); openOverlay('adminModal'); } }
function openPhoneInput(t) { if(cart.length===0) return; currentType = t; phoneTyped = ""; document.getElementById('phoneDisplay').innerText = "---"; openOverlay('phoneModal'); }
function pressPhone(n) { if(phoneTyped.length < 3) phoneTyped += n; document.getElementById('phoneDisplay').innerText = phoneTyped; }
function clearPhone() { phoneTyped = ""; document.getElementById('phoneDisplay').innerText = "---"; }
function confirmPhone() { 
    if(currentType==="EDIT_PHONE") {
        const o = kdsOrders.find(x=>x.id===editingKdsId); if(o) o.phone = phoneTyped || "---";
        const s = salesData.find(x=>x.id===editingKdsId); if(s) s.phone = phoneTyped || "---";
        persist(); renderKDS(); closeOverlay('phoneModal'); return;
    }
    closeOverlay('phoneModal');
    if(currentType === '現金') { cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; openOverlay('cashModal'); } 
    else { finishOrder(currentType, phoneTyped); }
}
function pressCash(n) { cashTyped += n; document.getElementById('cashDisplay').innerText = parseInt(cashTyped)||0; }
function quickCash(v) { let cur = parseInt(document.getElementById('cashDisplay').innerText)||0; cashTyped = (cur+v).toString(); document.getElementById('cashDisplay').innerText = cashTyped; }
function clearCash() { cashTyped = ""; document.getElementById('cashDisplay').innerText = "0"; }
function submitCash() { const t = parseInt(document.getElementById('finalTotal').innerText); if(parseInt(cashTyped||0)<t) return alert("實收不足"); document.getElementById('changeVal').innerText = "$" + (parseInt(cashTyped)-t); closeOverlay('cashModal'); openOverlay('changeModal'); finishOrder("現金", phoneTyped); }
function openDiscountModal() { discTyped = ""; document.getElementById('discDisplay').innerText = "0"; openOverlay('discountModal'); }
function pressDisc(n) { discTyped += n; document.getElementById('discDisplay').innerText = parseInt(discTyped)||0; }
function clearDisc() { discTyped = ""; document.getElementById('discDisplay').innerText = "0"; }
function submitDisc() { discountAmount = parseInt(discTyped)||0; updateCartUI(); closeOverlay('discountModal'); }

renderMenu(); renderKDS();
</script>
</body>
</html>
